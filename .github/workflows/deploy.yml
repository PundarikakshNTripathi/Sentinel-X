name: Sentinel-X CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory:./inference-engine
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v2
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: uv pip install -e. --system
    - name: Run Pytest
      run: uv run pytest tests/

  test-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory:./backend-gateway
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - name: Run Go Tests
      run: go test./... -race